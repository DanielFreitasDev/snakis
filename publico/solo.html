<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakis - Modo Solo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <!-- ===================================================================
       TELA DO MODO SOLO
       Canvas de jogo com HUD (pontuacao, vidas, efeitos ativos),
       tela de game over e controles via teclado ou toque.
       =================================================================== -->

  <!-- Header com informacoes do jogo -->
  <div class="hud-solo">
    <div class="hud-esquerda">
      <a href="/" class="botao-voltar">← Menu</a>
    </div>
    <div class="hud-centro">
      <div class="hud-item">
        <span class="hud-label">Pontuacao</span>
        <span id="pontuacao" class="hud-valor">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Recorde</span>
        <span id="recorde" class="hud-valor">0</span>
      </div>
    </div>
    <div class="hud-direita">
      <div class="hud-item">
        <span class="hud-label">Vidas</span>
        <span id="vidas" class="hud-valor hud-vidas">❤️❤️❤️</span>
      </div>
    </div>
  </div>

  <!-- Barra de efeitos ativos -->
  <div id="barra-efeitos" class="barra-efeitos"></div>

  <!-- Container do canvas de jogo -->
  <div class="container-jogo">
    <canvas id="canvas-jogo" class="canvas-jogo"></canvas>

    <!-- Overlay: Tela inicial (antes de comecar) -->
    <div id="tela-inicio" class="overlay-jogo">
      <div class="overlay-conteudo">
        <h2>🐍 Snakis Solo</h2>
        <p>Devore tudo no caminho e prove que voce e a cobra mais voraz!</p>
        <p class="teclas-info">Use <strong>WASD</strong> ou <strong>Setas</strong> para mover</p>
        <button id="botao-iniciar" class="botao-acao botao-iniciar">Iniciar Jogo</button>
      </div>
    </div>

    <!-- Overlay: Game Over -->
    <div id="tela-gameover" class="overlay-jogo" style="display:none;">
      <div class="overlay-conteudo">
        <h2>💀 Fim de Jogo!</h2>
        <p class="gameover-pontuacao">Pontuacao: <strong id="pontuacao-final">0</strong></p>
        <p id="novo-recorde" class="novo-recorde" style="display:none;">🎉 Novo Recorde!</p>
        <button id="botao-reiniciar" class="botao-acao botao-iniciar">Jogar Novamente</button>
        <a href="/" class="botao-acao botao-secundario">Voltar ao Menu</a>
      </div>
    </div>

    <!-- Overlay: Pausado -->
    <div id="tela-pausado" class="overlay-jogo" style="display:none;">
      <div class="overlay-conteudo">
        <h2>⏸ Pausado</h2>
        <p>Pressione <strong>ESC</strong> ou <strong>P</strong> para continuar</p>
      </div>
    </div>
  </div>

  <!-- Controles mobile (touch) -->
  <div class="controles-mobile" id="controles-mobile">
    <button class="botao-direcao" data-direcao="cima">▲</button>
    <div class="controles-meio">
      <button class="botao-direcao" data-direcao="esquerda">◄</button>
      <button class="botao-direcao" data-direcao="baixo">▼</button>
      <button class="botao-direcao" data-direcao="direita">►</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/constantes.js"></script>
  <script src="/js/SistemaDeParticulas.js"></script>
  <script src="/js/Renderizador.js"></script>
  <script src="/js/JogoSolo.js"></script>
</body>
</html>
